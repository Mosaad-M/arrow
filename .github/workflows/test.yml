name: Tests
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Check CPU features
        run: |
          echo "CPU model: $(grep 'model name' /proc/cpuinfo | head -1)"
          echo "CPU flags: $(grep '^flags' /proc/cpuinfo | head -1)"
          grep -q avx2 /proc/cpuinfo     || { echo "MISSING: avx2 — re-queue this job"; exit 1; }
          grep -q avx512f /proc/cpuinfo  || { echo "MISSING: avx512f — re-queue this job"; exit 1; }

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1
      - name: Install mojo-pkg
        run: curl -fsSL https://raw.githubusercontent.com/Mosaad-M/mojo-pkg/main/scripts/install.sh | bash
      - name: Install dependencies
        run: ~/.mojo/bin/mojo-pkg install
      - name: Run arrow tests
        run: pixi run test-arrow
      - name: Run CSV arrow tests
        run: pixi run test-csv-arrow

  test-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1
      - name: Install mojo-pkg
        run: curl -fsSL https://raw.githubusercontent.com/Mosaad-M/mojo-pkg/main/scripts/install.sh | bash
      - name: Install dependencies
        run: ~/.mojo/bin/mojo-pkg install
      - name: Run arrow tests
        run: pixi run test-arrow
      - name: Run CSV arrow tests
        run: pixi run test-csv-arrow

  test-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1
      - name: Install mojo-pkg
        run: curl -fsSL https://raw.githubusercontent.com/Mosaad-M/mojo-pkg/main/scripts/install.sh | bash
      - name: Install dependencies
        run: ~/.mojo/bin/mojo-pkg install
      - name: Run arrow tests
        run: pixi run test-arrow
      - name: Run CSV arrow tests
        run: pixi run test-csv-arrow
