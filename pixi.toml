[workspace]
channels = ["https://conda.modular.com/max", "conda-forge"]
name = "arrow"
platforms = ["linux-64"]
version = "0.1.0"

[activation]
env = { FLATBUFFERS = "../flatbuffers" }

[tasks]
install = "mojo-pkg install"
test-arrow = "bash -c 'mojo run $(cat .mojo_flags 2>/dev/null || echo \"-I $FLATBUFFERS\") test_arrow.mojo'"
test-csv-arrow = "bash -c 'mojo run $(cat .mojo_flags 2>/dev/null || echo \"-I $FLATBUFFERS\") test_csv_arrow.mojo'"
csv-to-feather = "bash -c 'mojo run $(cat .mojo_flags 2>/dev/null || echo \"-I $FLATBUFFERS\") csv_arrow.mojo'"
bench-arrow = "bash -c 'mojo run $(cat .mojo_flags 2>/dev/null || echo \"-I $FLATBUFFERS\") bench_arrow.mojo'"
format = "mblack arrow.mojo test_arrow.mojo csv_arrow.mojo"

[dependencies]
mojo = ">=0.26.2"
